    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #6b6b6b;
            --border: #e5e5e5;
            --accent: #2c2c2c;
            --accent-hover: #444;
            --overlay: rgba(0, 0, 0, 0.92);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 8px;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html { background: var(--bg); }
        body {
            font-family: var(--sans);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 48px 24px 0;
        }
        .header h1 {
            font-family: var(--serif);
            font-weight: 300;
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            letter-spacing: 0.04em;
            color: var(--text);
        }
        .header p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 0.03em;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 32px auto 0;
            max-width: 420px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 14px 24px;
            background: none;
            border: none;
            font-family: var(--sans);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20%;
            width: 60%;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .tab-btn.active { color: var(--text); }
        .tab-btn.active::after { transform: scaleX(1); }
        .tab-btn:hover { color: var(--text); }

        /* ── Tab Content ── */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── Hero Photo ── */
        .hero-photo {
            max-width: 1100px;
            margin: 36px auto 0;
            padding: 0 24px;
        }
        .hero-photo img {
            width: 100%;
            max-height: 600px;
            object-fit: cover;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .hero-photo img:hover { transform: scale(1.005); }

        /* ── Gallery Grid ── */
        .gallery-section {
            max-width: 1200px;
            margin: 40px auto 60px;
            padding: 0 24px;
        }
        .gallery-section h2 {
            font-family: var(--serif);
            font-weight: 400;
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            background: var(--border);
        }
        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease, filter 0.4s ease;
        }
        .gallery-item:hover img,
        .gallery-item:hover video {
            transform: scale(1.05);
            filter: brightness(0.9);
        }
        .gallery-item .video-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            pointer-events: none;
        }

        /* ── Loading State ── */
        .loading {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-secondary);
        }
        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            text-align: center;
            padding: 60px 24px;
            color: #b44;
            font-size: 0.9rem;
        }

        /* ── Lightbox ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: var(--overlay);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lightbox.open { display: flex; }
        .lightbox-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .lightbox-close:hover { opacity: 1; }
        .lightbox-media {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
            user-select: none;
        }
        .lightbox video.lightbox-media {
            outline: none;
        }
        .lightbox-counter {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            margin-top: 12px;
            font-weight: 300;
        }
        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1.4rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10;
        }
        .lightbox-arrow:hover { background: rgba(255,255,255,0.2); }
        .lightbox-arrow.prev { left: 20px; }
        .lightbox-arrow.next { right: 20px; }
        .lightbox-fullscreen {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.8rem;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .lightbox-fullscreen:hover { background: rgba(255,255,255,0.2); }
        .lightbox-download {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.8rem;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .lightbox-download:hover { background: rgba(255,255,255,0.2); }

        /* ── Upload Button ── */
        .upload-area {
            max-width: 1200px;
            margin: 36px auto 0;
            padding: 0 24px;
            display: flex;
            justify-content: flex-end;
        }
        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-family: var(--sans);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.02em;
        }
        .upload-btn:hover { background: var(--accent-hover); }
        .upload-btn svg { width: 18px; height: 18px; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header { padding: 32px 16px 0; }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 8px;
            }
            .hero-photo img { max-height: 350px; }
            .lightbox-arrow { width: 40px; height: 40px; font-size: 1.1rem; }
            .lightbox-arrow.prev { left: 10px; }
            .lightbox-arrow.next { right: 10px; }
            .tabs { max-width: 100%; margin: 24px 16px 0; }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .gallery-item { border-radius: 4px; }
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-secondary);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* ── Fade-in animation ── */
        .gallery-item { animation: fadeUp 0.4s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stagger items */
        .gallery-item:nth-child(1) { animation-delay: 0.02s; }
        .gallery-item:nth-child(2) { animation-delay: 0.04s; }
        .gallery-item:nth-child(3) { animation-delay: 0.06s; }
        .gallery-item:nth-child(4) { animation-delay: 0.08s; }
        .gallery-item:nth-child(5) { animation-delay: 0.10s; }
        .gallery-item:nth-child(6) { animation-delay: 0.12s; }
        .gallery-item:nth-child(7) { animation-delay: 0.14s; }
        .gallery-item:nth-child(8) { animation-delay: 0.16s; }
        .gallery-item:nth-child(9) { animation-delay: 0.18s; }
        .gallery-item:nth-child(10) { animation-delay: 0.20s; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>Megan & Danté</h1>
        <p>Our Wedding Gallery</p>
    </header>

    <!-- Tabs -->
    <nav class="tabs">
        <button class="tab-btn active" data-tab="professional" onclick="switchTab('professional')">Professional</button>
        <button class="tab-btn" data-tab="shared" onclick="switchTab('shared')">Shared Photos</button>
    </nav>

    <!-- Professional Photos Tab -->
    <div id="tab-professional" class="tab-content active">
        <div id="pro-hero" class="hero-photo"></div>
        <section class="gallery-section">
            <div id="pro-loading" class="loading">
                <div class="spinner"></div>
                <p>Loading photos...</p>
            </div>
            <div id="pro-error" class="error-msg" style="display:none;"></div>
            <div id="pro-gallery" class="gallery-grid"></div>
        </section>
    </div>

    <!-- Shared Photos Tab -->
    <div id="tab-shared" class="tab-content">
        <div class="upload-area">
            <a class="upload-btn" href="https://drive.google.com/drive/folders/1NQZWPW2Qv1UaUbwNR6dnB6SbaxcLBiVV?usp=sharing" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Photos & Videos
            </a>
        </div>
        <div id="shared-hero" class="hero-photo"></div>
        <section class="gallery-section">
            <div id="shared-loading" class="loading">
                <div class="spinner"></div>
                <p>Loading shared photos...</p>
            </div>
            <div id="shared-error" class="error-msg" style="display:none;"></div>
            <div id="shared-gallery" class="gallery-grid"></div>
            <div id="shared-empty" class="empty-state" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <p>No shared photos yet. Be the first to add one!</p>
            </div>
        </section>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-arrow prev" onclick="lightboxNav(-1)">&#8249;</button>
        <button class="lightbox-arrow next" onclick="lightboxNav(1)">&#8250;</button>
        <!-- Media element inserted dynamically -->
        <div class="lightbox-counter" id="lightbox-counter"></div>
        <a class="lightbox-download" id="lightbox-download" download>Download</a>
        <button class="lightbox-fullscreen" onclick="toggleFullscreen()">Fullscreen</button>
    </div>


    <script>
    // ═══════════════════════════════════════════
    // CONFIGURATION — Fill these in after setup
    // ═══════════════════════════════════════════
    const CONFIG = {
        // Google API Key (for reading from Drive)
        API_KEY: 'AIzaSyBGCk8UhJza2S5GCmKlq1O4db4Ox8H-jbM',

        // Google Drive folder IDs
        PROFESSIONAL_FOLDER_ID: '15aqu89nxOZix1qVKv3ldfI-PU52epgRD',
        SHARED_FOLDER_ID: '1NQZWPW2Qv1UaUbwNR6dnB6SbaxcLBiVV',

        // Hero photo file ID (set to a specific Google Drive file ID, or leave blank to use the first photo)
        HERO_PHOTO_ID: '1BHeVHCb-xAIWnCFq3d-z8kr9-YyuZwct',
    };

    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════
    let proPhotos = [];
    let sharedPhotos = [];
    let currentLightbox = { items: [], index: 0 };
    let sharedLoaded = false;

    // ═══════════════════════════════════════════
    // TABS
    // ═══════════════════════════════════════════
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');

        if (tab === 'shared' && !sharedLoaded) {
            sharedLoaded = true;
            loadFolder('shared');
        }
    }

    // ═══════════════════════════════════════════
    // GOOGLE DRIVE API — Load Photos
    // ═══════════════════════════════════════════
    async function loadFolder(type) {
        const folderId = type === 'professional' ? CONFIG.PROFESSIONAL_FOLDER_ID : CONFIG.SHARED_FOLDER_ID;
        const loadingEl = document.getElementById(`${type === 'professional' ? 'pro' : 'shared'}-loading`);
        const errorEl = document.getElementById(`${type === 'professional' ? 'pro' : 'shared'}-error`);
        const galleryEl = document.getElementById(`${type === 'professional' ? 'pro' : 'shared'}-gallery`);
        const heroEl = document.getElementById(`${type === 'professional' ? 'pro' : 'shared'}-hero`);
        const emptyEl = type === 'shared' ? document.getElementById('shared-empty') : null;

        try {
            let allFiles = [];
            let pageToken = '';

            // Paginate through all results
            do {
                const url = `https://www.googleapis.com/drive/v3/files?` +
                    `q='${folderId}'+in+parents+and+trashed=false` +
                    `&fields=nextPageToken,files(id,name,mimeType,thumbnailLink,createdTime,imageMediaMetadata,videoMediaMetadata)` +
                    `&orderBy=name` +
                    `&pageSize=100` +
                    `&key=${CONFIG.API_KEY}` +
                    (pageToken ? `&pageToken=${pageToken}` : '');

                const res = await fetch(url);
                if (!res.ok) throw new Error(`API error: ${res.status}`);
                const data = await res.json();

                if (data.files) allFiles = allFiles.concat(data.files);
                pageToken = data.nextPageToken || '';
            } while (pageToken);

            // Filter to images and videos only
            const mediaFiles = allFiles.filter(f =>
                f.mimeType.startsWith('image/') || f.mimeType.startsWith('video/')
            );

            // Natural sort by filename (handles numeric parts like date(1).JPG, date(2).JPG, date(10).JPG)
            mediaFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

            loadingEl.style.display = 'none';

            if (mediaFiles.length === 0) {
                if (emptyEl) emptyEl.style.display = 'block';
                return;
            }

            // Build items array
            const items = mediaFiles.map(f => ({
                id: f.id,
                name: f.name,
                isVideo: f.mimeType.startsWith('video/'),
                mimeType: f.mimeType,
                thumb: f.thumbnailLink
                    ? f.thumbnailLink.replace(/=s\d+/, '=s400')
                    : `https://drive.google.com/thumbnail?id=${f.id}&sz=w400`,
                full: f.isVideo
                    ? `https://drive.google.com/file/d/${f.id}/preview`
                    : `https://drive.google.com/thumbnail?id=${f.id}&sz=w1600`,
                download: `https://drive.google.com/uc?export=download&id=${f.id}`,
            }));

            if (type === 'professional') {
                proPhotos = items;
            } else {
                sharedPhotos = items;
            }

            // Set hero photo (configurable via HERO_PHOTO_ID, or falls back to first photo)
            let heroIndex = 0;
            if (type === 'professional' && CONFIG.HERO_PHOTO_ID) {
                const idx = items.findIndex(item => item.id === CONFIG.HERO_PHOTO_ID);
                if (idx !== -1) heroIndex = idx;
            }
            if (items.length > 0 && !items[heroIndex].isVideo) {
                const heroImg = document.createElement('img');
                heroImg.src = `https://drive.google.com/thumbnail?id=${items[heroIndex].id}&sz=w1600`;
                heroImg.alt = items[heroIndex].name;
                heroImg.loading = 'eager';
                heroImg.fetchPriority = 'high';
                heroImg.onclick = () => openLightbox(items, heroIndex);
                heroEl.appendChild(heroImg);

                // Wait for hero to load before showing the gallery grid
                await new Promise(resolve => {
                    heroImg.onload = resolve;
                    heroImg.onerror = resolve;
                    // Fallback timeout in case load event doesn't fire
                    setTimeout(resolve, 4000);
                });
            }

            // Build gallery grid
            items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.style.animationDelay = `${Math.min(i * 0.02, 0.4)}s`;

                if (item.isVideo) {
                    // For videos, use thumbnail image with a play badge
                    const img = document.createElement('img');
                    img.src = item.thumb;
                    img.alt = item.name;
                    img.loading = 'lazy';
                    div.appendChild(img);

                    const badge = document.createElement('span');
                    badge.className = 'video-badge';
                    badge.textContent = 'VIDEO';
                    div.appendChild(badge);
                } else {
                    const img = document.createElement('img');
                    img.src = item.thumb;
                    img.alt = item.name;
                    img.loading = 'lazy';
                    div.appendChild(img);
                }

                div.onclick = () => openLightbox(items, i);
                galleryEl.appendChild(div);
            });

        } catch (err) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = `Failed to load photos. ${err.message}`;
            console.error('Drive API error:', err);
        }
    }

    // ═══════════════════════════════════════════
    // LIGHTBOX
    // ═══════════════════════════════════════════
    function openLightbox(items, index) {
        currentLightbox = { items, index };
        const lb = document.getElementById('lightbox');
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
        showLightboxItem();
    }

    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('open');
        document.body.style.overflow = '';

        // Remove any existing media
        const existing = lb.querySelector('.lightbox-media');
        if (existing) existing.remove();

        // Exit fullscreen if active
        if (document.fullscreenElement) {
            document.exitFullscreen();
        }
    }

    function showLightboxItem() {
        const lb = document.getElementById('lightbox');
        const item = currentLightbox.items[currentLightbox.index];

        // Remove existing media
        const existing = lb.querySelector('.lightbox-media');
        if (existing) existing.remove();

        let mediaEl;
        if (item.isVideo) {
            // Use an iframe for Google Drive video preview
            mediaEl = document.createElement('iframe');
            mediaEl.src = item.full;
            mediaEl.className = 'lightbox-media';
            mediaEl.style.width = '80vw';
            mediaEl.style.height = '70vh';
            mediaEl.style.border = 'none';
            mediaEl.allow = 'autoplay';
        } else {
            mediaEl = document.createElement('img');
            mediaEl.src = item.full;
            mediaEl.alt = item.name;
            mediaEl.className = 'lightbox-media';
        }

        // Insert before counter
        const counter = document.getElementById('lightbox-counter');
        lb.insertBefore(mediaEl, counter);

        // Update counter
        counter.textContent = `${currentLightbox.index + 1} / ${currentLightbox.items.length}`;

        // Update download link
        const dl = document.getElementById('lightbox-download');
        dl.href = item.download;
        dl.style.display = item.isVideo ? 'none' : 'block';
    }

    function lightboxNav(dir) {
        const total = currentLightbox.items.length;
        currentLightbox.index = (currentLightbox.index + dir + total) % total;
        showLightboxItem();
    }

    function toggleFullscreen() {
        const lb = document.getElementById('lightbox');
        if (!document.fullscreenElement) {
            lb.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        const lb = document.getElementById('lightbox');
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') lightboxNav(-1);
        if (e.key === 'ArrowRight') lightboxNav(1);
        if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    });

    // Click backdrop to close
    document.getElementById('lightbox').addEventListener('click', (e) => {
        if (e.target.classList.contains('lightbox')) closeLightbox();
    });

    // Touch/swipe support for lightbox
    (function() {
        let touchStartX = 0;
        const lb = document.getElementById('lightbox');

        lb.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        lb.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) {
                lightboxNav(diff > 0 ? -1 : 1);
            }
        }, { passive: true });
    })();

    // ═══════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════
    loadFolder('professional');
    </script>
</body>
</html>
